<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PixelSkies">
<title>PixelSkies</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1a0030;font-family:'Press Start 2P',monospace;color:#00ffff;overflow-x:hidden}

/* SCANLINES */
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:999}

/* HEADER */
#header{background:#2a0050;border-bottom:4px solid #ff00ff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;image-rendering:pixelated}
#logo{font-size:14px;color:#ffff00;text-shadow:3px 3px 0 #ff00ff,-1px -1px 0 #00ffff;letter-spacing:1px}
#logo span{color:#ff00ff}
#add-btn{background:#ff00ff;color:#000;border:none;padding:6px 10px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;border-bottom:3px solid #aa00aa;border-right:3px solid #aa00aa;image-rendering:pixelated}
#add-btn:active{border-bottom:1px solid #aa00aa;border-right:1px solid #aa00aa;transform:translate(2px,2px)}

/* ADD CITY PANEL */
#add-panel{background:#2a0050;border-bottom:4px solid #ff00ff;padding:10px 16px;display:none;align-items:center;gap:8px}
#city-input{flex:1;background:#000;border:2px solid #00ffff;color:#00ffff;font-family:'Press Start 2P',monospace;font-size:10px;padding:6px 8px;outline:none}
#city-input::placeholder{color:#336}
#city-submit{background:#ffff00;color:#000;border:none;padding:6px 10px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;border-bottom:3px solid #aaaa00;border-right:3px solid #aaaa00;white-space:nowrap}
#city-submit:active{transform:translate(2px,2px)}

/* CITIES */
#cities{padding:12px}
.city-card{background:#2a0050;border:3px solid #ff00ff;margin-bottom:12px;position:relative;overflow:hidden}
.city-card:hover{border-color:#ffff00}
.city-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 0;position:relative;z-index:2}
.city-name{font-size:9px;color:#ffff00;text-shadow:2px 2px 0 #ff00ff}
.city-remove{background:none;border:none;color:#ff00ff;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;padding:0}
.city-remove:hover{color:#ffff00}
.city-body{display:flex;align-items:center;padding:8px 12px 12px;gap:12px;position:relative;z-index:2}
.city-icon{width:64px;height:64px;flex-shrink:0;position:relative}
.city-info{flex:1}
.city-temp{font-size:24px;color:#00ffff;text-shadow:3px 3px 0 #006666;margin-bottom:6px}
.city-cond{font-size:7px;color:#ff00ff;margin-bottom:8px;line-height:1.6}
.city-details{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.city-detail{font-size:6px;color:#aaffff}
.city-detail span{color:#ffff00}
.city-loading{padding:20px;text-align:center;font-size:8px;color:#ff00ff;animation:blink 1s infinite}

/* ANIMATED WEATHER ICONS */
canvas.wx-icon{image-rendering:pixelated;width:64px;height:64px}

/* WEATHER BACKGROUNDS */
.wx-sunny .city-card-bg{background:linear-gradient(180deg,#3a0060,#1a0030)}
.wx-cloudy .city-card-bg{background:linear-gradient(180deg,#1a1a3a,#0a0a20)}
.wx-rain .city-card-bg{background:linear-gradient(180deg,#001a2a,#000a10)}
.wx-snow .city-card-bg{background:linear-gradient(180deg,#0a1a2a,#050d15)}
.wx-storm .city-card-bg{background:linear-gradient(180deg,#0a0010,#050008)}
.city-card-bg{position:absolute;inset:0;z-index:1}

/* RAIN ANIMATION */
.rain-container{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.raindrop{position:absolute;width:2px;background:linear-gradient(180deg,transparent,#00aaff);animation:fall linear infinite;opacity:.7}
@keyframes fall{0%{transform:translateY(-20px)}100%{transform:translateY(120px)}}

/* SNOW ANIMATION */
.snowflake{position:absolute;color:#fff;font-size:8px;animation:snowfall linear infinite;opacity:.8}
@keyframes snowfall{0%{transform:translateY(-20px) rotate(0deg)}100%{transform:translateY(120px) rotate(360deg)}}

/* LIGHTNING */
.lightning{position:absolute;inset:0;background:#ffffaa;z-index:3;pointer-events:none;opacity:0;animation:lightning 4s infinite}
@keyframes lightning{0%,89%,91%,100%{opacity:0}90%{opacity:.4}92%,95%{opacity:0}93%{opacity:.6}}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

#empty{text-align:center;padding:40px 20px;font-size:8px;color:#ff00ff;line-height:2.5}
#empty div{margin-bottom:8px}

/* PIXEL FONT SIZES */
.px6{font-size:6px}
.px7{font-size:7px}
.px8{font-size:8px}
.px10{font-size:10px}
</style>
</head>
<body>

<div id="header">
  <div id="logo">PIXEL<span>SKIES</span></div>
  <button id="add-btn" onclick="toggleAdd()">+ CITY</button>
</div>

<div id="add-panel">
  <input id="city-input" placeholder="Enter city name..." onkeydown="if(event.key==='Enter')addCity()"/>
  <button id="city-submit" onclick="addCity()">ADD</button>
</div>

<div id="cities">
  <div id="empty">
    <div>☁ ☁ ☁</div>
    <div>NO CITIES ADDED</div>
    <div style="color:#ffff00">PRESS + CITY TO START</div>
  </div>
</div>

<script>
var cities = JSON.parse(localStorage.getItem("pixelskies_cities")||"[]");
var weatherData = {};

function toggleAdd(){
  var p=document.getElementById("add-panel");
  p.style.display=p.style.display==="flex"?"none":"flex";
  if(p.style.display==="flex") document.getElementById("city-input").focus();
}

function addCity(){
  var val=document.getElementById("city-input").value.trim();
  if(!val)return;
  if(cities.find(function(c){return c.toLowerCase()===val.toLowerCase();})){
    document.getElementById("city-input").value="";
    return;
  }
  cities.push(val);
  saveCities();
  document.getElementById("city-input").value="";
  document.getElementById("add-panel").style.display="none";
  loadCity(val);
}

function removeCity(name){
  cities=cities.filter(function(c){return c!==name;});
  saveCities();
  renderAll();
}

function saveCities(){
  localStorage.setItem("pixelskies_cities",JSON.stringify(cities));
}

function getWxClass(code){
  if(code===0)return"sunny";
  if(code<=2)return"cloudy";
  if(code===3)return"cloudy";
  if(code<=67)return"rain";
  if(code<=77)return"snow";
  if(code<=82)return"rain";
  if(code<=99)return"storm";
  return"cloudy";
}

function getWxLabel(code){
  if(code===0)return"CLEAR SKY";
  if(code===1)return"MAINLY CLEAR";
  if(code===2)return"PARTLY CLOUDY";
  if(code===3)return"OVERCAST";
  if(code<=45)return"FOGGY";
  if(code<=55)return"DRIZZLE";
  if(code<=65)return"RAIN";
  if(code<=67)return"FREEZING RAIN";
  if(code<=77)return"SNOW";
  if(code<=82)return"RAIN SHOWERS";
  if(code<=99)return"THUNDERSTORM";
  return"UNKNOWN";
}

function drawIcon(canvas, wxClass, frame){
  var ctx=canvas.getContext("2d");
  var s=canvas.width;
  ctx.clearRect(0,0,s,s);

  if(wxClass==="sunny"){
    // Animated sun with rotating rays
    var cx=s/2,cy=s/2,r=12;
    // Rays
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(frame*0.05);
    ctx.strokeStyle="#ffff00";
    ctx.lineWidth=3;
    for(var i=0;i<8;i++){
      ctx.save();
      ctx.rotate(i*Math.PI/4);
      ctx.beginPath();ctx.moveTo(0,r+4);ctx.lineTo(0,r+10);ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
    // Sun body
    ctx.fillStyle="#ffff00";
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#ffaa00";
    ctx.beginPath();ctx.arc(cx,cy,r-3,0,Math.PI*2);ctx.fill();
  }

  else if(wxClass==="cloudy"){
    var bob=Math.sin(frame*0.05)*3;
    // Cloud pixels
    ctx.fillStyle="#aaaaff";
    var cloud=[[2,3],[3,2],[3,3],[3,4],[4,1],[4,2],[4,3],[4,4],[4,5],[5,1],[5,2],[5,3],[5,4],[5,5],[5,6],[6,2],[6,3],[6,4],[6,5],[7,3],[7,4]];
    cloud.forEach(function(p){ctx.fillRect(p[0]*5+2,p[1]*4+bob+4,5,4);});
  }

  else if(wxClass==="rain"){
    var bob2=Math.sin(frame*0.04)*2;
    // Cloud
    ctx.fillStyle="#6666aa";
    var cl=[[2,1],[3,0],[3,1],[4,0],[4,1],[4,2],[5,0],[5,1],[5,2],[6,1],[6,2],[7,2]];
    cl.forEach(function(p){ctx.fillRect(p[0]*5,p[1]*4+bob2+2,5,4);});
    // Animated rain drops
    ctx.fillStyle="#00aaff";
    for(var r2=0;r2<6;r2++){
      var rx=(r2*9+frame*3)%56+4;
      var ry=((r2*13+frame*4)%24)+28;
      ctx.fillRect(rx,ry,2,6);
    }
  }

  else if(wxClass==="snow"){
    var bob3=Math.sin(frame*0.04)*2;
    // Cloud
    ctx.fillStyle="#8888bb";
    var cs=[[2,1],[3,0],[3,1],[4,0],[4,1],[4,2],[5,0],[5,1],[5,2],[6,1],[6,2],[7,2]];
    cs.forEach(function(p){ctx.fillRect(p[0]*5,p[1]*4+bob3+2,5,4);});
    // Snowflakes
    ctx.fillStyle="#ffffff";
    for(var sf=0;sf<5;sf++){
      var sx=(sf*11+frame*2)%54+5;
      var sy=((sf*17+frame*3)%22)+30;
      ctx.fillRect(sx,sy,4,4);
      ctx.fillRect(sx-2,sy+2,8,2);
      ctx.fillRect(sx+2,sy-2,2,8);
    }
  }

  else if(wxClass==="storm"){
    // Dark cloud
    ctx.fillStyle="#444466";
    var cst=[[1,1],[2,0],[2,1],[3,0],[3,1],[3,2],[4,0],[4,1],[4,2],[5,1],[5,2],[6,2],[7,2],[8,2]];
    cst.forEach(function(p){ctx.fillRect(p[0]*4,p[1]*5+2,4,5);});
    // Lightning bolt
    var flash=Math.sin(frame*0.3)>0.7;
    ctx.fillStyle=flash?"#ffff00":"#aaaa00";
    ctx.beginPath();
    ctx.moveTo(30,30);ctx.lineTo(24,44);ctx.lineTo(30,44);
    ctx.lineTo(24,58);ctx.lineTo(38,40);ctx.lineTo(32,40);
    ctx.lineTo(38,30);ctx.closePath();ctx.fill();
    // Rain
    ctx.fillStyle="#0066aa";
    for(var rs=0;rs<4;rs++){
      var rsx=(rs*14+frame*4)%52+6;
      var rsy=((rs*11+frame*5)%16)+36;
      ctx.fillRect(rsx,rsy,2,5);
    }
  }
}

var animFrames={};
function startAnim(id,wxClass){
  if(animFrames[id])cancelAnimationFrame(animFrames[id]);
  var frame=0;
  function loop(){
    var canvas=document.getElementById("icon-"+id);
    if(!canvas){delete animFrames[id];return;}
    drawIcon(canvas,wxClass,frame++);
    animFrames[id]=requestAnimationFrame(loop);
  }
  loop();
}

async function loadCity(name){
  var id=name.replace(/[^a-z0-9]/gi,"").toLowerCase();
  // Add loading card
  var el=document.getElementById("card-"+id);
  if(!el){
    el=document.createElement("div");
    el.id="card-"+id;
    el.className="city-card";
    el.innerHTML='<div class="city-loading">LOADING '+name.toUpperCase()+'...</div>';
    document.getElementById("cities").appendChild(el);
    document.getElementById("empty").style.display="none";
  }

  try{
    // Geocode
    var geoR=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(name)+"&count=1&language=en&format=json");
    var geoD=await geoR.json();
    if(!geoD.results||!geoD.results[0])throw new Error("City not found");
    var loc=geoD.results[0];

    // Weather
    var wxR=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+loc.latitude+"&longitude="+loc.longitude+"&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto");
    var wxD=await wxR.json();
    var cur=wxD.current;
    var code=cur.weather_code;
    var wxClass=getWxClass(code);

    weatherData[id]={name:loc.name||name,country:loc.country_code||"",temp:Math.round(cur.temperature_2m),feels:Math.round(cur.apparent_temperature),humidity:cur.relative_humidity_2m,wind:Math.round(cur.wind_speed_10m),cond:getWxLabel(code),wxClass:wxClass};

    renderCard(id);
  }catch(e){
    el.innerHTML='<div class="city-loading" style="color:#ff4444">ERROR: '+name.toUpperCase()+'<br><br><span style="font-size:6px">CHECK CITY NAME</span></div>';
    setTimeout(function(){
      removeCity(name);
    },3000);
  }
}

function renderCard(id){
  var d=weatherData[id];
  if(!d)return;
  var el=document.getElementById("card-"+id);
  if(!el)return;
  el.className="city-card wx-"+d.wxClass;

  var rainHTML="";
  if(d.wxClass==="rain"||d.wxClass==="storm"){
    rainHTML='<div class="rain-container" id="rain-'+id+'">';
    for(var i=0;i<15;i++){
      var left=Math.random()*100;
      var dur=(Math.random()*0.5+0.4).toFixed(2);
      var delay=(Math.random()*1).toFixed(2);
      var h=Math.random()*20+10;
      rainHTML+='<div class="raindrop" style="left:'+left+'%;height:'+h+'px;animation-duration:'+dur+'s;animation-delay:'+delay+'s"></div>';
    }
    rainHTML+='</div>';
  }

  var snowHTML="";
  if(d.wxClass==="snow"){
    snowHTML='<div class="rain-container">';
    for(var s=0;s<10;s++){
      var sl=Math.random()*100;
      var sd=(Math.random()*1+0.8).toFixed(2);
      var sdel=(Math.random()*2).toFixed(2);
      snowHTML+='<div class="snowflake" style="left:'+sl+'%;animation-duration:'+sd+'s;animation-delay:'+sdel+'s">*</div>';
    }
    snowHTML+='</div>';
  }

  var lightningHTML=d.wxClass==="storm"?'<div class="lightning"></div>':"";

  el.innerHTML='<div class="city-card-bg"></div>'
    +rainHTML+snowHTML+lightningHTML
    +'<div class="city-header">'
    +'<div class="city-name">'+d.name.toUpperCase()+(d.country?' ['+d.country.toUpperCase()+']':'')+'</div>'
    +'<button class="city-remove" onclick="removeCity(\''+d.name.replace(/'/g,"\\'")+'\')" title="Remove">✕</button>'
    +'</div>'
    +'<div class="city-body">'
    +'<canvas class="wx-icon" id="icon-'+id+'" width="64" height="64"></canvas>'
    +'<div class="city-info">'
    +'<div class="city-temp">'+d.temp+'°F</div>'
    +'<div class="city-cond">'+d.cond+'</div>'
    +'<div class="city-details">'
    +'<div class="city-detail">FEELS <span>'+d.feels+'°</span></div>'
    +'<div class="city-detail">HUMID <span>'+d.humidity+'%</span></div>'
    +'<div class="city-detail">WIND <span>'+d.wind+'MPH</span></div>'
    +'</div>'
    +'</div>'
    +'</div>';

  startAnim(id,d.wxClass);
}

function renderAll(){
  var container=document.getElementById("cities");
  container.innerHTML='<div id="empty" style="'+(cities.length?"display:none":"")+';text-align:center;padding:40px 20px;font-size:8px;color:#ff00ff;line-height:2.5"><div>☁ ☁ ☁</div><div>NO CITIES ADDED</div><div style="color:#ffff00">PRESS + CITY TO START</div></div>';
  cities.forEach(function(name){
    var id=name.replace(/[^a-z0-9]/gi,"").toLowerCase();
    var div=document.createElement("div");
    div.id="card-"+id;
    div.className="city-card";
    div.innerHTML='<div class="city-loading">LOADING...</div>';
    container.appendChild(div);
    if(weatherData[id]){renderCard(id);}
    else{loadCity(name);}
  });
}

// Auto refresh every 10 minutes
setInterval(function(){
  cities.forEach(function(name){loadCity(name);});
},600000);

renderAll();
</script>
</body>
</html>
