<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PixelSkies">
<title>PixelSkies</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1a0030;font-family:'Press Start 2P',monospace;color:#00ffff;overflow-x:hidden}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:999}

#header{background:#2a0050;border-bottom:4px solid #ff00ff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
#logo{font-size:14px;color:#ffff00;text-shadow:3px 3px 0 #ff00ff,-1px -1px 0 #00ffff;letter-spacing:1px;flex:1;text-align:center}
#logo span{color:#ff00ff}
#add-btn{background:#ff00ff;color:#000;border:none;padding:6px 10px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;border-bottom:3px solid #aa00aa;border-right:3px solid #aa00aa;flex-shrink:0}
#add-btn:active{transform:translate(2px,2px);border-bottom:1px solid #aa00aa;border-right:1px solid #aa00aa}

#add-panel{background:#2a0050;border-bottom:4px solid #ff00ff;padding:10px 16px;display:none;align-items:center;gap:8px}
#city-input{flex:1;background:#000;border:2px solid #00ffff;color:#00ffff;font-family:'Press Start 2P',monospace;font-size:10px;padding:6px 8px;outline:none}
#city-input::placeholder{color:#336}
#city-submit{background:#ffff00;color:#000;border:none;padding:6px 10px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;border-bottom:3px solid #aaaa00;border-right:3px solid #aaaa00;white-space:nowrap}
#city-submit:active{transform:translate(2px,2px)}

/* Search suggestions */
#suggestions{position:absolute;background:#000;border:2px solid #ff00ff;width:calc(100% - 32px);z-index:100;display:none;max-height:200px;overflow-y:auto}
.suggestion{padding:8px;font-size:8px;color:#00ffff;cursor:pointer;border-bottom:1px solid #330033}
.suggestion:hover{background:#2a0050;color:#ffff00}
#add-wrap{position:relative;flex:1;display:flex;gap:8px}

#cities{padding:12px}

.city-card{background:#2a0050;border:3px solid #ff00ff;margin-bottom:12px;position:relative;overflow:hidden}
.city-card-bg{position:absolute;inset:0;z-index:1}
.city-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 0;position:relative;z-index:2}
.city-name{font-size:9px;color:#ffff00;text-shadow:2px 2px 0 #ff00ff}
.city-remove{background:#ff00ff;border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;padding:3px 7px;border-bottom:2px solid #aa00aa;border-right:2px solid #aa00aa}
.city-remove:active{transform:translate(1px,1px)}
.city-body{display:flex;align-items:center;padding:8px 12px 8px;gap:12px;position:relative;z-index:2}
.city-icon{width:64px;height:64px;flex-shrink:0}
.city-info{flex:1}
.city-temp{font-size:24px;color:#00ffff;text-shadow:3px 3px 0 #006666;margin-bottom:6px}
.city-cond{font-size:7px;color:#ff00ff;margin-bottom:8px;line-height:1.6}
.city-details{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.city-detail{font-size:6px;color:#aaffff}
.city-detail span{color:#ffff00}

/* FORECAST BAR */
.forecast-bar{display:flex;border-top:2px solid #ff00ff;position:relative;z-index:2;background:rgba(0,0,0,0.3)}
.fc-day{flex:1;text-align:center;padding:6px 2px;border-right:1px solid #330033}
.fc-day:last-child{border-right:none}
.fc-dow{font-size:5px;color:#ff00ff;margin-bottom:3px}
.fc-icon{font-size:14px;line-height:1;margin-bottom:3px}
.fc-hi{font-size:6px;color:#ffff00}
.fc-lo{font-size:5px;color:#6666ff;margin-top:1px}

/* WEATHER FX */
.rain-container{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.raindrop{position:absolute;width:2px;background:linear-gradient(180deg,transparent,#00aaff);animation:fall linear infinite;opacity:.7}
@keyframes fall{0%{transform:translateY(-20px)}100%{transform:translateY(200px)}}
.snowflake{position:absolute;color:#fff;font-size:8px;animation:snowfall linear infinite;opacity:.8}
@keyframes snowfall{0%{transform:translateY(-20px) rotate(0deg)}100%{transform:translateY(200px) rotate(360deg)}}
.lightning{position:absolute;inset:0;background:#ffffaa;z-index:3;pointer-events:none;opacity:0;animation:lightning 4s infinite}
@keyframes lightning{0%,89%,91%,100%{opacity:0}90%{opacity:.4}93%{opacity:.6}}

.city-loading{padding:20px;text-align:center;font-size:8px;color:#ff00ff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#empty{text-align:center;padding:40px 20px;font-size:8px;color:#ff00ff;line-height:2.5}
</style>
</head>
<body>

<div id="header">
  <div style="width:80px"></div>
  <div id="logo">PIXEL<span>SKIES</span></div>
  <button id="add-btn" onclick="toggleAdd()">+ CITY</button>
</div>

<div id="add-panel">
  <div id="add-wrap">
    <input id="city-input" placeholder="Enter city name..." 
      oninput="onCityInput()" 
      onkeydown="if(event.key==='Enter'){addCity();} if(event.key==='Escape'){hideSuggestions();}"/>
    <div id="suggestions"></div>
    <button id="city-submit" onclick="addCity()">ADD</button>
  </div>
</div>

<div id="cities">
  <div id="empty">
    <div>☁ ☁ ☁</div>
    <div>NO CITIES ADDED</div>
    <div style="color:#ffff00">PRESS + CITY TO START</div>
  </div>
</div>

<script>
var cities = JSON.parse(localStorage.getItem("pixelskies_v2")||"[]");
var weatherData = {};
var searchTimer = null;

function toggleAdd(){
  var p=document.getElementById("add-panel");
  p.style.display=p.style.display==="flex"?"none":"flex";
  if(p.style.display==="flex") setTimeout(function(){document.getElementById("city-input").focus();},50);
}

function hideSuggestions(){
  document.getElementById("suggestions").style.display="none";
}

function onCityInput(){
  clearTimeout(searchTimer);
  var val=document.getElementById("city-input").value.trim();
  if(val.length<2){hideSuggestions();return;}
  searchTimer=setTimeout(function(){fetchSuggestions(val);},300);
}

async function fetchSuggestions(q){
  try{
    var r=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=5&language=en&format=json");
    var d=await r.json();
    var results=d.results||[];
    var box=document.getElementById("suggestions");
    if(!results.length){box.style.display="none";return;}
    box.innerHTML="";
    results.forEach(function(loc){
      var label=loc.name+(loc.admin1?", "+loc.admin1:"")+(loc.country?", "+loc.country:"");
      var div=document.createElement("div");
      div.className="suggestion";
      div.textContent=label;
      div.onclick=function(){
        document.getElementById("city-input").value=label;
        hideSuggestions();
        addCityFromLoc(loc,label);
      };
      box.appendChild(div);
    });
    box.style.display="block";
  }catch(e){hideSuggestions();}
}

function addCity(){
  var val=document.getElementById("city-input").value.trim();
  if(!val)return;
  hideSuggestions();
  // Check duplicate by display name
  if(cities.find(function(c){return c.label&&c.label.toLowerCase()===val.toLowerCase();})){
    document.getElementById("city-input").value="";
    toggleAdd();
    return;
  }
  // If no suggestion was picked, geocode manually
  fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(val)+"&count=1&language=en&format=json")
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.results&&d.results[0]){
        var loc=d.results[0];
        var label=loc.name+(loc.admin1?", "+loc.admin1:"")+(loc.country?", "+loc.country:"");
        addCityFromLoc(loc,label);
      }
    });
  document.getElementById("city-input").value="";
  toggleAdd();
}

function addCityFromLoc(loc,label){
  if(cities.find(function(c){return c.id===String(loc.id);}))return;
  var city={id:String(loc.id),label:label,lat:loc.latitude,lon:loc.longitude};
  cities.push(city);
  saveCities();
  document.getElementById("city-input").value="";
  document.getElementById("add-panel").style.display="none";
  hideSuggestions();
  loadCity(city);
  document.getElementById("empty").style.display="none";
}

function removeCity(id){
  cities=cities.filter(function(c){return c.id!==id;});
  saveCities();
  var el=document.getElementById("card-"+id);
  if(el)el.remove();
  if(cities.length===0) document.getElementById("empty").style.display="block";
}

function saveCities(){
  localStorage.setItem("pixelskies_v2",JSON.stringify(cities));
}

function getWxClass(code){
  if(code===0)return"sunny";
  if(code<=2)return"cloudy";
  if(code===3)return"cloudy";
  if(code<=67)return"rain";
  if(code<=77)return"snow";
  if(code<=82)return"rain";
  if(code<=99)return"storm";
  return"cloudy";
}
function getWxLabel(code){
  if(code===0)return"CLEAR SKY";
  if(code===1)return"MAINLY CLEAR";
  if(code===2)return"PARTLY CLOUDY";
  if(code===3)return"OVERCAST";
  if(code<=45)return"FOGGY";
  if(code<=55)return"DRIZZLE";
  if(code<=65)return"RAIN";
  if(code<=67)return"FREEZING RAIN";
  if(code<=77)return"SNOW";
  if(code<=82)return"RAIN SHOWERS";
  if(code<=99)return"THUNDERSTORM";
  return"UNKNOWN";
}
function getWxEmoji(code){
  if(code===0)return"☀";
  if(code<=2)return"⛅";
  if(code===3)return"☁";
  if(code<=45)return"🌫";
  if(code<=67)return"🌧";
  if(code<=77)return"❄";
  if(code<=82)return"🌦";
  if(code<=99)return"⛈";
  return"☁";
}

var animFrames={};
function drawIcon(canvas,wxClass,frame){
  var ctx=canvas.getContext("2d");
  var s=canvas.width;
  ctx.clearRect(0,0,s,s);
  if(wxClass==="sunny"){
    var cx=s/2,cy=s/2,r=12;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(frame*0.05);
    ctx.strokeStyle="#ffff00";ctx.lineWidth=3;
    for(var i=0;i<8;i++){ctx.save();ctx.rotate(i*Math.PI/4);ctx.beginPath();ctx.moveTo(0,r+4);ctx.lineTo(0,r+10);ctx.stroke();ctx.restore();}
    ctx.restore();
    ctx.fillStyle="#ffff00";ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#ffaa00";ctx.beginPath();ctx.arc(cx,cy,r-3,0,Math.PI*2);ctx.fill();
  } else if(wxClass==="cloudy"){
    var bob=Math.sin(frame*0.05)*3;
    ctx.fillStyle="#aaaaff";
    [[2,3],[3,2],[3,3],[3,4],[4,1],[4,2],[4,3],[4,4],[4,5],[5,1],[5,2],[5,3],[5,4],[5,5],[5,6],[6,2],[6,3],[6,4],[6,5],[7,3],[7,4]].forEach(function(p){ctx.fillRect(p[0]*5+2,p[1]*4+bob+4,5,4);});
  } else if(wxClass==="rain"){
    var bob2=Math.sin(frame*0.04)*2;
    ctx.fillStyle="#6666aa";
    [[2,1],[3,0],[3,1],[4,0],[4,1],[4,2],[5,0],[5,1],[5,2],[6,1],[6,2],[7,2]].forEach(function(p){ctx.fillRect(p[0]*5,p[1]*4+bob2+2,5,4);});
    ctx.fillStyle="#00aaff";
    for(var r2=0;r2<6;r2++){ctx.fillRect((r2*9+frame*3)%56+4,((r2*13+frame*4)%24)+28,2,6);}
  } else if(wxClass==="snow"){
    var bob3=Math.sin(frame*0.04)*2;
    ctx.fillStyle="#8888bb";
    [[2,1],[3,0],[3,1],[4,0],[4,1],[4,2],[5,0],[5,1],[5,2],[6,1],[6,2],[7,2]].forEach(function(p){ctx.fillRect(p[0]*5,p[1]*4+bob3+2,5,4);});
    ctx.fillStyle="#ffffff";
    for(var sf=0;sf<5;sf++){var sx=(sf*11+frame*2)%54+5,sy=((sf*17+frame*3)%22)+30;ctx.fillRect(sx,sy,4,4);ctx.fillRect(sx-2,sy+2,8,2);ctx.fillRect(sx+2,sy-2,2,8);}
  } else if(wxClass==="storm"){
    ctx.fillStyle="#444466";
    [[1,1],[2,0],[2,1],[3,0],[3,1],[3,2],[4,0],[4,1],[4,2],[5,1],[5,2],[6,2],[7,2],[8,2]].forEach(function(p){ctx.fillRect(p[0]*4,p[1]*5+2,4,5);});
    ctx.fillStyle=Math.sin(frame*0.3)>0.7?"#ffff00":"#aaaa00";
    ctx.beginPath();ctx.moveTo(30,30);ctx.lineTo(24,44);ctx.lineTo(30,44);ctx.lineTo(24,58);ctx.lineTo(38,40);ctx.lineTo(32,40);ctx.lineTo(38,30);ctx.closePath();ctx.fill();
    ctx.fillStyle="#0066aa";
    for(var rs=0;rs<4;rs++){ctx.fillRect((rs*14+frame*4)%52+6,((rs*11+frame*5)%16)+36,2,5);}
  }
}
function startAnim(id,wxClass){
  if(animFrames[id])cancelAnimationFrame(animFrames[id]);
  var frame=0;
  function loop(){
    var c=document.getElementById("icon-"+id);
    if(!c){delete animFrames[id];return;}
    drawIcon(c,wxClass,frame++);
    animFrames[id]=requestAnimationFrame(loop);
  }
  loop();
}

async function loadCity(city){
  var id=city.id;
  document.getElementById("empty").style.display="none";
  var el=document.getElementById("card-"+id);
  if(!el){
    el=document.createElement("div");
    el.id="card-"+id;
    el.className="city-card";
    el.innerHTML='<div class="city-loading">LOADING...</div>';
    document.getElementById("cities").appendChild(el);
  }
  try{
    var r=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+city.lat+"&longitude="+city.lon+"&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=7");
    var d=await r.json();
    var cur=d.current;
    var daily=d.daily;
    var code=cur.weather_code;
    var wxClass=getWxClass(code);
    weatherData[id]={
      label:city.label,lat:city.lat,lon:city.lon,
      temp:Math.round(cur.temperature_2m),
      feels:Math.round(cur.apparent_temperature),
      humidity:cur.relative_humidity_2m,
      wind:Math.round(cur.wind_speed_10m),
      cond:getWxLabel(code),wxClass:wxClass,
      daily:daily
    };
    renderCard(id,city);
  }catch(e){
    el.innerHTML='<div class="city-loading" style="color:#ff4444">ERROR LOADING</div>';
  }
}

function renderCard(id,city){
  var d=weatherData[id];
  if(!d)return;
  var el=document.getElementById("card-"+id);
  if(!el)return;
  el.className="city-card";

  var rainHTML="",snowHTML="",lightHTML="";
  if(d.wxClass==="rain"||d.wxClass==="storm"){
    rainHTML='<div class="rain-container">';
    for(var i=0;i<15;i++){rainHTML+='<div class="raindrop" style="left:'+Math.random()*100+'%;height:'+(Math.random()*15+8)+'px;animation-duration:'+(Math.random()*0.4+0.3).toFixed(2)+'s;animation-delay:'+(Math.random()*1).toFixed(2)+'s"></div>';}
    rainHTML+='</div>';
  }
  if(d.wxClass==="snow"){
    snowHTML='<div class="rain-container">';
    for(var s=0;s<10;s++){snowHTML+='<div class="snowflake" style="left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*1+0.8).toFixed(2)+'s;animation-delay:'+(Math.random()*2).toFixed(2)+'s">*</div>';}
    snowHTML+='</div>';
  }
  if(d.wxClass==="storm") lightHTML='<div class="lightning"></div>';

  // Forecast bar — next 6 days
  var days=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var fcHTML='<div class="forecast-bar">';
  for(var f=1;f<7;f++){
    if(!d.daily||!d.daily.time||!d.daily.time[f])break;
    var dt=new Date(d.daily.time[f]+"T12:00:00");
    var dow=days[dt.getDay()];
    var hi=Math.round(d.daily.temperature_2m_max[f]);
    var lo=Math.round(d.daily.temperature_2m_min[f]);
    var fc=getWxEmoji(d.daily.weather_code[f]);
    fcHTML+='<div class="fc-day"><div class="fc-dow">'+dow+'</div><div class="fc-icon">'+fc+'</div><div class="fc-hi">'+hi+'°</div><div class="fc-lo">'+lo+'°</div></div>';
  }
  fcHTML+='</div>';

  el.innerHTML='<div class="city-card-bg"></div>'+rainHTML+snowHTML+lightHTML
    +'<div class="city-header">'
    +'<div class="city-name">'+d.label.toUpperCase()+'</div>'
    +'<button class="city-remove" onclick="removeCity(\''+id+'\')">✕ REMOVE</button>'
    +'</div>'
    +'<div class="city-body">'
    +'<canvas class="city-icon" id="icon-'+id+'" width="64" height="64" style="image-rendering:pixelated"></canvas>'
    +'<div class="city-info">'
    +'<div class="city-temp">'+d.temp+'°F</div>'
    +'<div class="city-cond">'+d.cond+'</div>'
    +'<div class="city-details">'
    +'<div class="city-detail">FEELS <span>'+d.feels+'°</span></div>'
    +'<div class="city-detail">HUMID <span>'+d.humidity+'%</span></div>'
    +'<div class="city-detail">WIND <span>'+d.wind+'MPH</span></div>'
    +'</div></div></div>'
    +fcHTML;

  startAnim(id,d.wxClass);
}

function renderAll(){
  var container=document.getElementById("cities");
  container.innerHTML='<div id="empty" style="'+(cities.length?"display:none":"")+';text-align:center;padding:40px 20px;font-size:8px;color:#ff00ff;line-height:2.5"><div>☁ ☁ ☁</div><div>NO CITIES ADDED</div><div style="color:#ffff00">PRESS + CITY TO START</div></div>';
  cities.forEach(function(city){
    var div=document.createElement("div");
    div.id="card-"+city.id;
    div.className="city-card";
    div.innerHTML='<div class="city-loading">LOADING...</div>';
    container.appendChild(div);
    if(weatherData[city.id]) renderCard(city.id,city);
    else loadCity(city);
  });
}

setInterval(function(){cities.forEach(function(c){loadCity(c);});},600000);
document.addEventListener("click",function(e){if(!e.target.closest("#add-wrap"))hideSuggestions();});
renderAll();
</script>
</body>
</html>
